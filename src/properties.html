<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BRprop 项目页，帮助中国买家理解区域、作物与尽调重点。">
    <title>BRprop | 土地项目</title>
    <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/responsive.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/"><span class="brand__mark">禾</span><span>BRprop</span></a>
        <button class="mobile-nav-toggle" type="button" data-mobile-menu-button aria-expanded="false">Menu</button>
        <nav class="site-nav" data-mobile-menu>
          <a href="/" data-i18n="nav.home">首页</a>
          <a class="is-active" href="/properties.html" data-i18n="nav.properties">土地项目</a>
          <a href="/knowledge.html" data-i18n="nav.knowledge">投资指南</a>
          <a href="/about.html" data-i18n="nav.about">关于我们</a>
          <a href="/contact.html" data-i18n="nav.contact">联系我们</a>
          <div class="locale-switcher">
            <button type="button" data-locale-button="zh" class="is-active">中文</button>
            <button type="button" data-locale-button="pt">PT</button>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container page-hero__grid">
          <div>
            <div class="eyebrow">Project inventory</div>
            <h1 data-i18n="properties.title">土地项目与区域筛选</h1>
            <p class="lead" data-i18n="properties.description">用于前期沟通的示例资产卡片，帮助您快速理解区域、作物与尽调重点。</p>
          </div>
          <aside class="page-hero-aside">
            <h2>How to read this page</h2>
            <ul>
              <li>这些项目卡片用于前期对话，不等于最终法律营销材料。</li>
              <li>真正进入交易前，还需要文件、环境与结构审查。</li>
            </ul>
          </aside>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="filter-bar">
            <div class="note-box" style="flex: 1;">
              <p>中国买家通常先按作物和区域筛选，再决定是否看更细的物流和文件信息。</p>
            </div>
            <select data-property-filter>
              <option value="" data-i18n="properties.filterAll">全部作物</option>
              <option value="soybean" data-i18n="properties.filterSoybean">大豆</option>
              <option value="corn" data-i18n="properties.filterCorn">玉米</option>
              <option value="cotton" data-i18n="properties.filterCotton">棉花</option>
              <option value="mixed" data-i18n="properties.filterMixed">多作物</option>
            </select>
          </div>
          <div class="cards-grid" data-properties-grid></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p><strong>BRprop</strong></p>
        <div class="site-footer__links">
          <a href="/knowledge.html" data-i18n="nav.knowledge">投资指南</a>
          <a href="/contact.html" data-i18n="nav.contact">联系我们</a>
          <span data-current-year></span>
        </div>
      </div>
    </footer>

    <script type="module" src="/scripts/properties.js"></script>
  </body>
</html>
